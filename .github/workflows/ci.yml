name: CI

on:
  pull_request:
    branches: [ master ]
  workflow_run:
    workflows: [ "Version Bump" ]
    types: [ completed ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'master' || '' }}

      - name: Set up Azul Zulu JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '26'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run unit tests
        run: mvn clean test --batch-mode --no-transfer-progress

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'master' || '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build socks-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: socks-server-socks-server:latest
          cache-from: type=gha,scope=socks-server
          cache-to: type=gha,scope=socks-server,mode=max

      - name: Build integration-tests image
        uses: docker/build-push-action@v6
        with:
          context: ./integration-tests
          load: true
          tags: socks-server-integration-tests:latest
          cache-from: type=gha,scope=integration-tests
          cache-to: type=gha,scope=integration-tests,mode=max

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml up \
            --no-build \
            --abort-on-container-exit \
            --exit-code-from integration-tests

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down
