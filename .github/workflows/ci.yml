name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download google-java-format
        run: |
          curl -sSL -o google-java-format \
            https://github.com/google/google-java-format/releases/download/v1.35.0/google-java-format_linux-x86-64
          chmod +x google-java-format

      - name: Check code formatting
        run: |
          UNFORMATTED=$(find src -name "*.java" -exec ./google-java-format --dry-run {} + 2>/dev/null || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ The following files are not formatted:"
            echo "$UNFORMATTED"
            echo ""
            echo "Run locally: java -jar google-java-format.jar --replace \$(find src -name '*.java')"
            exit 1
          fi
          echo "✅ All files are properly formatted"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Azul Zulu JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '26'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run unit tests
        run: mvn clean test --batch-mode --no-transfer-progress

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build and run integration tests
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from integration-tests

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down
